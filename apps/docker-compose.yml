services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: azureuser
      POSTGRES_PASSWORD: P@ssw0rd123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azureuser -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: azureuser
      DB_PASSWORD: P@ssw0rd123!
      DB_NAME: ecommerce
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 24h
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: development
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: azureuser
      DB_PASSWORD: P@ssw0rd123!
      DB_NAME: ecommerce
      JWT_SECRET: dev-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: development
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: azureuser
      DB_PASSWORD: P@ssw0rd123!
      DB_NAME: ecommerce
      JWT_SECRET: dev-jwt-secret-change-in-production
      PRODUCT_SERVICE_URL: http://product-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3004
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started

  payment-service:
    build: ./payment-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      NODE_ENV: development
      LOG_LEVEL: info

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      AUTH_SERVICE_URL: http://localhost:3001
      PRODUCT_SERVICE_URL: http://localhost:3002
      ORDER_SERVICE_URL: http://localhost:3003
    depends_on:
      - auth-service
      - product-service
      - order-service

volumes:
  pgdata:
