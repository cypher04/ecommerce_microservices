<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopMicro - Ecommerce</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> ShopMicro</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/products.html">Products</a></li>
          <li class="nav-item nav-logged-in"><a class="nav-link" href="/orders.html">My Orders</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item nav-logged-in">
            <a class="nav-link" href="/cart.html"><i class="bi bi-cart3"></i> Cart <span class="badge bg-primary" id="cart-count">0</span></a>
          </li>
          <li class="nav-item nav-logged-in">
            <span class="nav-link text-light"><i class="bi bi-person-circle"></i> <span id="nav-user-name"></span></span>
          </li>
          <li class="nav-item nav-logged-in">
            <a class="nav-link" href="#" id="btn-logout">Logout</a>
          </li>
          <li class="nav-item nav-logged-out">
            <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#authModal">
              <i class="bi bi-box-arrow-in-right"></i> Login / Register
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section text-center">
    <div class="container">
      <h1 class="display-4 fw-bold">Welcome to ShopMicro</h1>
      <p class="lead">Your one-stop microservices-powered ecommerce platform</p>
      <a href="/products.html" class="btn btn-light btn-lg mt-3"><i class="bi bi-bag"></i> Browse Products</a>
    </div>
  </section>

  <!-- Featured Products -->
  <main class="container my-5">
    <h2 class="mb-4"><i class="bi bi-star"></i> Featured Products</h2>
    <div class="row" id="featured-products"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 ShopMicro — Built with microservices on Azure AKS</p>
    </div>
  </footer>

  <!-- Auth Modal -->
  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Account</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-login">Login</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-register">Register</a></li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-login">
              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="login-email" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
            </div>
            <div class="tab-pane fade" id="tab-register">
              <form id="register-form">
                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input type="text" class="form-control" id="register-name" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="register-email" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="register-password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-success w-100">Register</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => App.renderProducts('featured-products'));
    function onAuthChange() { App.renderProducts('featured-products'); }
  </script>
</body>
</html>
