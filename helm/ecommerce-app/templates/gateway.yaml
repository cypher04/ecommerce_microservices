{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    alb.networking.azure.io/alb-id: {{ .Values.gateway.agcID | quote }}
    alb.networking.azure.io/alb-frontend: {{ .Values.gateway.frontendName | quote }}
spec:
  gatewayClassName: azure-alb-external
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
{{- end }}
